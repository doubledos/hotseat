<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Hot Seat 🔥</title>
<style>
/* ===== Reset & tokens ===== */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  /* warm hot-seat palette — gold/flame on cream, maroon ink */
  --c-bg:#fbead0;
  --c-surface:#fff8ec;
  --c-surface2:#fbe6bf;
  --c-border:#ecd19a;
  --c-border2:#dba959;
  /* accent: burnt flame orange-red for ALL interactive elements */
  --c-accent:#d94a1f;
  --c-accent-hi:#f06a3d;
  --c-accent-dim:#a83618;
  /* gold reserved EXCLUSIVELY for money */
  --c-gold:#e8a13c;
  --c-gold-light:#f2b95c;
  --c-gold-dim:#b97e22;
  --c-ink:#3a1a12;
  --c-muted:#8a6a4a;
  --c-green:#1e7d43;
  --c-green-light:#2fa860;
  --c-red:#b8302f;
  --c-red-light:#d6524f;
  --c-blue:#1a5fa8;
  --c-purple:#6b3fa0;
  --r:12px;
  --shadow:0 8px 24px rgba(120,70,20,0.18);
  --shadow-gold:0 0 18px rgba(217,74,31,0.2);
  --font-display:'Alfa Slab One','Arial Black',sans-serif;
  --font-body:'Oswald','Helvetica Neue',sans-serif;
  --font-script:'Pacifico',cursive;
  /* Hot Seat brand tokens — used by the TV display's per-mode stage colors */
  --stage-gold:#FFF931;
  --stage-green:#206243;
  --stage-maroon:#622030;
  --ember:#7F1515;
  --cream:#FFFBF2;
  --ink:#241506;
}

button{font-family:inherit;cursor:pointer;border:none;outline:none;}
input,textarea,select{font-family:inherit;outline:none;}
a{color:inherit;text-decoration:none;}

/* ===== Typography ===== */
.font-display{font-family:var(--font-display);letter-spacing:0.06em;font-weight:400;}

/* ===== Layout ===== */
.app{min-height:100vh;}
.page{display:none;}
.page.active{display:flex;flex-direction:column;min-height:100vh;}

/* ===== Inline SVG Icons ===== */
.icon{display:inline-flex;align-items:center;justify-content:center;width:1em;height:1em;vertical-align:middle;flex-shrink:0;}
.icon svg{width:100%;height:100%;fill:currentColor;}

/* ===== Buttons ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:10px;font-weight:600;font-size:14px;padding:10px 18px;transition:all .16s ease;cursor:pointer;border:none;font-family:var(--font-body);}
.btn:active{transform:scale(0.985);}
.btn-primary{background:var(--c-accent);color:#fff8ec;}
.btn-primary:hover{background:var(--c-accent-hi);box-shadow:0 4px 16px rgba(255,122,69,0.3);}
.btn-primary:disabled{opacity:0.4;cursor:default;transform:none;}
.btn-ghost{background:transparent;border:1.5px solid var(--c-border2);color:var(--c-ink);}
.btn-ghost:hover{border-color:var(--c-accent);color:var(--c-accent-hi);}
.btn-ghost:disabled{opacity:0.4;cursor:default;}
.btn-danger{background:transparent;border:1.5px solid var(--c-border);color:var(--c-muted);}
.btn-danger:hover{border-color:var(--c-red-light);color:var(--c-red-light);}
.btn-success{background:var(--c-green);color:#fff;}
.btn-success:hover{background:var(--c-green-light);color:#0b1220;}
.btn-error{background:var(--c-red);color:#fff;}
.btn-error:hover{background:var(--c-red-light);}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;}
.btn-lg{padding:14px 28px;font-size:16px;border-radius:12px;}
.btn-xl{padding:18px 36px;font-size:22px;border-radius:14px;font-family:var(--font-display);letter-spacing:0.08em;}
.btn-icon{width:36px;height:36px;padding:0;border-radius:10px;}
.btn-block{width:100%;}

/* ===== Form elements ===== */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--c-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.08em;font-weight:600;}
.input{width:100%;background:var(--c-surface);border:1.5px solid var(--c-border2);color:var(--c-ink);border-radius:10px;padding:11px 14px;font-size:14px;transition:border-color .15s;font-family:var(--font-body);}
.input:focus{border-color:var(--c-accent);}
.input-lg{font-size:18px;padding:14px 18px;border-radius:10px;text-align:center;font-weight:700;letter-spacing:0.1em;}
textarea.input{resize:vertical;min-height:70px;}
select.input{cursor:pointer;}
.row{display:flex;gap:12px;}
.row>.field{flex:1;}
.row>.field.w2{flex:2;}

/* ===== Cards / panels ===== */
.card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r);padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.2);}
.card-gold{border-color:var(--c-gold-dim);box-shadow:var(--shadow-gold);}
.card-sm{padding:14px;}
.panel{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r);overflow:hidden;}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;transition:background .12s;}
.panel-header:hover{background:rgba(212,168,67,0.05);}
.panel-title{display:flex;align-items:center;gap:8px;font-size:12px;text-transform:uppercase;letter-spacing:0.1em;color:var(--c-gold);font-weight:700;}
.panel-body{padding:16px;}
.panel+.panel{margin-top:12px;}

/* ===== Tags / badges ===== */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;}
.badge-gold{background:var(--c-gold);color:#07111f;}
.badge-green{background:var(--c-green);color:#fff;}
.badge-red{background:var(--c-red);color:#fff;}
.badge-blue{background:var(--c-blue);color:#fff;}
.badge-muted{background:var(--c-surface2);color:var(--c-muted);border:1px solid var(--c-border);}

/* ===== Difficulty pills ===== */
.diff-easy{color:#4abe7a;background:rgba(46,139,87,0.15);border:1px solid rgba(74,190,122,0.3);padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;text-transform:uppercase;}
.diff-medium{color:#f0cc70;background:rgba(212,168,67,0.15);border:1px solid rgba(212,168,67,0.3);padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;text-transform:uppercase;}
.diff-hard{color:#e05555;background:rgba(176,48,48,0.15);border:1px solid rgba(224,85,85,0.3);padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;text-transform:uppercase;}
.diff-puzzle{color:#c070f0;background:rgba(90,45,138,0.15);border:1px solid rgba(192,112,240,0.3);padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;text-transform:uppercase;}

/* ===== Topbar ===== */
.topbar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:rgba(255,248,236,0.92);border-bottom:1px solid var(--c-border);backdrop-filter:blur(8px);position:sticky;top:0;z-index:50;flex-wrap:wrap;}
.topbar-brand{font-family:var(--font-display);font-size:20px;color:var(--c-gold);letter-spacing:0.05em;white-space:nowrap;}
.topbar-code{font-size:12px;color:var(--c-muted);background:var(--c-surface2);border:1px solid var(--c-border);border-radius:6px;padding:4px 10px;font-weight:700;letter-spacing:0.15em;}
.tabs{display:flex;gap:4px;margin:0 auto;}
.tab-btn{background:transparent;border:1px solid transparent;color:var(--c-muted);padding:7px 16px;border-radius:999px;font-size:13px;font-weight:600;transition:all .15s;cursor:pointer;}
.tab-btn.active{background:var(--c-accent);color:#fff8ec;border-color:var(--c-accent);}
.tab-btn:not(.active):hover{border-color:var(--c-border2);color:var(--c-accent-hi);}
.tab-btn:disabled{opacity:0.35;cursor:not-allowed;}
.tab-btn:disabled:hover{border-color:transparent;color:var(--c-muted);}

/* ===== Team chips in topbar ===== */
.team-strip{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.team-label{font-size:11px;color:var(--c-muted);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;}
.player-chip{display:inline-flex;align-items:center;gap:5px;background:var(--c-surface2);border:1px solid var(--c-border);border-radius:999px;padding:4px 10px;font-size:12px;font-weight:600;color:var(--c-ink);cursor:pointer;transition:all .12s;}
.player-chip:hover{border-color:var(--c-gold);}
.player-chip.is-hot{background:var(--c-gold);color:#07111f;border-color:var(--c-gold-light);}
.chip-bank{font-size:10px;color:var(--c-muted);font-weight:700;}
.player-chip.is-hot .chip-bank{color:rgba(7,17,31,0.6);}

/* ===== Flow card ===== */
.flow-card{background:var(--c-surface);border:1px solid var(--c-gold-dim);border-radius:var(--r);padding:20px;box-shadow:var(--shadow-gold);}
.flow-level{font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--c-gold);font-weight:700;margin-bottom:10px;}
.flow-q{font-size:20px;font-weight:700;line-height:1.4;color:var(--c-ink);margin-bottom:14px;}
.flow-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.flow-opt{background:var(--c-surface2);border:1px solid var(--c-border2);border-radius:8px;padding:10px 13px;font-size:14px;}
.flow-opt.correct{border-color:var(--c-green-light);box-shadow:inset 0 0 0 1px var(--c-green-light);}
.flow-opt.wrong-pick{border-color:var(--c-red-light);box-shadow:inset 0 0 0 1px var(--c-red-light);}
.flow-opt.answer-flash{border-color:var(--c-accent);background:rgba(255,122,69,0.1);}
.flow-opt.dim{opacity:0.3;}
.flow-reveal-btn{width:100%;text-align:left;padding:11px 14px;border-radius:10px;font-size:14px;font-weight:700;background:var(--c-accent);color:#fff8ec;border:none;cursor:pointer;transition:all .16s;}
.flow-reveal-btn:hover{background:var(--c-accent-hi);}
.flow-slot{margin-bottom:6px;}
.flow-opt-letter{color:var(--c-gold);font-weight:700;margin-right:6px;}
.flow-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:14px;}
.flow-lifelines{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px dashed var(--c-border);}

/* ===== Steal box ===== */
.steal-box{background:linear-gradient(180deg,rgba(176,48,48,0.12),var(--c-surface));border:1px solid var(--c-red);border-radius:var(--r);padding:18px;}
.steal-title{font-size:12px;text-transform:uppercase;letter-spacing:0.1em;color:var(--c-red-light);font-weight:700;margin-bottom:12px;}
.vote-row{display:flex;align-items:center;justify-content:space-between;background:var(--c-surface2);border:1px solid var(--c-border);border-radius:7px;padding:8px 12px;font-size:13px;margin-bottom:6px;}

/* ===== Puzzle ===== */
.puzzle-board{background:var(--c-surface2);border:1px solid var(--c-border);border-radius:var(--r);padding:20px;text-align:center;}
.board-words{display:flex;flex-wrap:wrap;justify-content:center;gap:10px 8px;}
.board-word{display:flex;gap:3px;}
.tile{width:clamp(28px,3.5vw,44px);height:clamp(34px,4.2vw,52px);background:linear-gradient(180deg,var(--c-surface2),var(--c-border));border:1.5px solid var(--c-gold-dim);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:clamp(17px,2.2vw,28px);color:var(--c-ink);box-shadow:inset 0 1px 0 rgba(255,255,255,0.07);}
.tile.blank{background:var(--c-surface);border-color:var(--c-border);color:transparent;}
.tile.flip{animation:tileFlip .45s ease;}
@keyframes tileFlip{0%{transform:rotateX(90deg);}55%{transform:rotateX(-8deg);}100%{transform:rotateX(0)}}
.keyboard{margin-top:16px;}
.kb-row{display:flex;gap:5px;justify-content:center;margin-bottom:5px;}
.key{width:clamp(28px,3.8vw,38px);height:38px;background:var(--c-surface2);border:1px solid var(--c-border2);border-radius:6px;color:var(--c-ink);font-weight:700;font-size:13px;cursor:pointer;transition:all .12s;}
.key:hover:not(:disabled){border-color:var(--c-gold);transform:translateY(-1px);}
.key:disabled{cursor:default;}
.key.hit{background:var(--c-green);border-color:var(--c-green);color:#fff;}
.key.miss{background:var(--c-surface);border-color:var(--c-red);color:#6a4040;}

/* ===== Puzzle timer ===== */
.puzzle-timer{display:flex;align-items:center;justify-content:center;gap:12px;margin:14px 0;}
.timer-circle{position:relative;width:64px;height:64px;}
.timer-svg{width:100%;height:100%;transform:rotate(-90deg);}
.timer-track{fill:none;stroke:var(--c-border);stroke-width:4;}
.timer-fill{fill:none;stroke:var(--c-gold);stroke-width:4;stroke-linecap:round;stroke-dasharray:175.9;stroke-dashoffset:0;transition:stroke-dashoffset .1s linear, stroke .5s;}
.timer-fill.urgent{stroke:var(--c-red-light);}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--c-ink);}
.timer-label{font-size:13px;color:var(--c-muted);}

/* ===== Wheel ===== */
.wheel-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;}
.wheel-outer{position:relative;width:240px;height:240px;}
.wheel-pointer{position:absolute;top:-10px;left:50%;transform:translateX(-50%);z-index:5;width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-top:22px solid var(--c-gold);filter:drop-shadow(0 2px 4px rgba(0,0,0,0.6));}
.wheel-disc{width:100%;height:100%;border-radius:50%;border:4px solid var(--c-gold);box-shadow:0 0 24px rgba(212,168,67,0.3),inset 0 0 20px rgba(0,0,0,0.4);transition:transform 4s cubic-bezier(0.1,0.6,0.05,1);}
.wheel-result{font-size:18px;font-weight:700;color:var(--c-gold-light);font-family:var(--font-display);letter-spacing:0.04em;text-align:center;}

/* ===== Money display ===== */
.money{font-variant-numeric:tabular-nums;font-weight:700;}
.money-lg{font-size:22px;color:var(--c-gold-light);}
.money-sm{font-size:13px;color:var(--c-gold);}
.money-pos{color:var(--c-green-light);}
.money-neg{color:var(--c-red-light);}

/* ===== Ladder (host topbar) ===== */
.ladder-row{display:flex;align-items:center;gap:4px;}
.lad-ic{width:26px;height:26px;border-radius:5px;border:1px solid var(--c-border);background:var(--c-surface2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--c-muted);position:relative;flex-shrink:0;}
.lad-ic.won{background:var(--c-green);border-color:var(--c-green);color:#fff;}
.lad-ic.current{background:var(--c-gold);border-color:var(--c-gold-light);color:#07111f;box-shadow:0 0 8px rgba(212,168,67,0.4);}
.lad-ic .tip{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#3a1a12;border:1px solid var(--c-gold);border-radius:6px;padding:5px 9px;font-size:11px;font-weight:600;white-space:nowrap;z-index:30;color:#fff8ec;box-shadow:0 4px 14px rgba(58,26,18,0.35);}
.lad-ic:hover .tip{display:block;}

/* ===== Adjust panel ===== */
.adjust-panel{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r);padding:16px;margin-bottom:14px;}
.adjust-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}

/* ===== Question bank list ===== */
.q-list{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto;margin-top:12px;padding-right:2px;}
.q-row{display:flex;align-items:flex-start;gap:10px;background:var(--c-surface2);border:1px solid var(--c-border);border-radius:7px;padding:10px 12px;font-size:13px;}
.q-row.editing{border-color:var(--c-gold);}
.q-row-text{flex:1;min-width:0;}
.q-row-sub{font-size:11px;color:var(--c-muted);margin-top:3px;}
.q-row-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.used-tag{font-size:10px;color:var(--c-green-light);text-transform:uppercase;font-weight:700;}

/* ===== Wager ===== */
.wager-box{background:linear-gradient(135deg,rgba(90,45,138,0.2),var(--c-surface));border:1px solid var(--c-purple);border-radius:var(--r);padding:18px;}
.wager-title{font-size:12px;text-transform:uppercase;letter-spacing:0.1em;color:#c070f0;font-weight:700;margin-bottom:12px;}
.wager-rows{display:flex;flex-direction:column;gap:6px;margin:10px 0;}
.wager-row{display:flex;align-items:center;justify-content:space-between;background:var(--c-surface2);border:1px solid var(--c-border);border-radius:7px;padding:8px 12px;font-size:13px;}

/* ===== TV Display ===== */
body.mode-display{overflow:hidden;}
body.mode-display .app{height:100vh;width:100%;display:flex;flex-direction:column;overflow:hidden;position:relative;isolation:isolate;
  background-color:var(--tv-bg);}
body.mode-display .app::before{content:'';position:absolute;inset:0;background-image:var(--tv-pattern);background-repeat:repeat;background-size:clamp(160px,22vw,420px) clamp(160px,22vw,420px);z-index:0;}
body.mode-display .app::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center, transparent 50%, var(--tv-bg) 88%);z-index:0;}
body.mode-display .app>*{position:relative;z-index:1;}

.tv-topbar{display:flex;align-items:stretch;padding:0;background:transparent;border-bottom:1px solid var(--tv-border);}
.tv-team-box{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 16px;}
.tv-team-box.is-hot{background:var(--tv-panel);}
.tv-team-name{font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--tv-text-soft);font-weight:700;}
.tv-team-bank{font-size:26px;font-weight:700;color:var(--tv-text);font-family:var(--font-display);}
.tv-center-top{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 20px;min-width:160px;}
.tv-level-badge{font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--tv-accent);font-weight:700;}
.tv-brand-sm{font-size:15px;color:var(--tv-text-soft);font-family:var(--font-display);letter-spacing:0.08em;}
.tv-main{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 40px;text-align:center;overflow-y:auto;position:relative;}
.tv-waiting{font-size:clamp(28px,5vw,52px);color:var(--tv-text-soft);font-family:var(--font-display);letter-spacing:0.06em;}
.tv-q-text{font-size:clamp(22px,4vw,46px);font-weight:700;line-height:1.25;color:var(--tv-text);margin-bottom:clamp(12px,2vh,24px);max-width:1000px;}
.tv-hotseat-name{font-size:clamp(26px,4.5vw,52px);font-family:var(--font-display);color:var(--tv-accent);letter-spacing:0.04em;margin-bottom:clamp(10px,1.5vh,20px);}
.tv-hotseat-team{font-size:clamp(12px,1.5vw,16px);color:var(--tv-text-soft);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:clamp(12px,2vh,24px);}
.tv-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:900px;width:100%;margin:0 auto;}
.tv-opt{background:var(--tv-panel);color:var(--tv-text);border:1px solid var(--tv-border);border-radius:10px;padding:clamp(10px,1.5vh,16px) clamp(12px,2vw,20px);font-size:clamp(15px,2.2vw,22px);font-weight:600;text-align:left;opacity:0;transform:translateY(8px);transition:all .4s;}
.tv-opt.shown{opacity:1;transform:none;}
.tv-opt.is-answer{border-color:var(--c-green-light);box-shadow:0 0 0 1px var(--c-green-light),0 0 16px rgba(74,190,122,0.25);}
.tv-opt.hs-pick{border-color:var(--tv-accent);box-shadow:0 0 0 1px var(--tv-accent),0 0 16px rgba(212,168,67,0.3);}
.tv-opt.not-answer{opacity:0.25;}
.tv-opt-letter{color:var(--tv-accent);font-weight:700;margin-right:8px;}
.tv-bottom{background:transparent;border-top:1px solid var(--tv-border);padding:10px 20px;}
.tv-player-banks{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:8px;}
.tv-player-bank{display:flex;flex-direction:column;align-items:center;gap:2px;}
.tv-player-name{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--tv-text-soft);}
.tv-player-amount{font-size:14px;font-weight:700;color:var(--tv-accent);}
.tv-ladder{display:flex;gap:5px;justify-content:center;align-items:center;flex-wrap:wrap;}
.tv-lad{width:32px;height:32px;border-radius:6px;border:1px solid var(--tv-border);background:var(--tv-panel);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--tv-text-soft);}
.tv-lad.won{background:var(--c-green);border-color:var(--c-green);color:#fff;}
.tv-lad.current{background:var(--tv-accent);border-color:var(--tv-accent);color:#07111f;box-shadow:0 0 10px rgba(212,168,67,0.4);}
.tv-steal-banner{background:linear-gradient(90deg,rgba(176,48,48,0.3),rgba(176,48,48,0.1));border:1px solid var(--c-red);border-radius:8px;padding:8px 18px;text-align:center;font-family:var(--font-display);font-size:clamp(16px,2.5vw,22px);color:#f0a0a0;letter-spacing:0.08em;margin-bottom:10px;}
.tv-wager-banner{background:linear-gradient(90deg,rgba(90,45,138,0.3),rgba(90,45,138,0.1));border:1px solid var(--c-purple);border-radius:8px;padding:8px 18px;text-align:center;font-family:var(--font-display);font-size:clamp(16px,2.5vw,22px);color:#c070f0;letter-spacing:0.08em;margin-bottom:10px;}

/* ===== Glitch ===== */
@keyframes glitch1{
  0%,100%{clip-path:inset(0 0 95% 0);transform:translate(-4px,0);filter:hue-rotate(0deg);}
  20%{clip-path:inset(30% 0 50% 0);transform:translate(4px,0);filter:hue-rotate(90deg) saturate(4);}
  40%{clip-path:inset(60% 0 20% 0);transform:translate(-6px,2px);filter:invert(0.8);}
  60%{clip-path:inset(10% 0 70% 0);transform:translate(5px,-2px);filter:hue-rotate(180deg);}
  80%{clip-path:inset(80% 0 5% 0);transform:translate(-3px,0);filter:contrast(3);}
}
@keyframes glitch2{
  0%,100%{clip-path:inset(50% 0 30% 0);transform:translate(4px,0);filter:hue-rotate(180deg);}
  25%{clip-path:inset(20% 0 60% 0);transform:translate(-5px,2px);filter:saturate(5) hue-rotate(270deg);}
  50%{clip-path:inset(75% 0 10% 0);transform:translate(6px,-3px);filter:brightness(2);}
  75%{clip-path:inset(5% 0 80% 0);transform:translate(-4px,1px);filter:invert(1);}
}
@keyframes glitchMain{
  0%,100%{transform:none;filter:none;}
  15%{transform:translate(-3px,1px);filter:brightness(1.5);}
  30%{transform:translate(4px,-2px);filter:hue-rotate(45deg);}
  45%{transform:translate(-5px,2px);filter:saturate(3) hue-rotate(90deg);}
  60%{transform:translate(3px,0);filter:contrast(2) brightness(0.7);}
  75%{transform:translate(-4px,-1px);filter:hue-rotate(180deg) saturate(2);}
  90%{transform:translate(2px,1px);filter:brightness(0.5) contrast(3);}
}
.glitching{position:relative;animation:glitchMain 1.8s steps(1) 1;}
.glitching::before,.glitching::after{content:attr(data-text);position:absolute;inset:0;background:inherit;}
.glitching::before{animation:glitch1 1.8s steps(1) 1;color:var(--c-red-light);}
.glitching::after{animation:glitch2 1.8s steps(1) 1;color:var(--c-gold-light);}

/* ===== Phone player view ===== */
body.mode-player .app{max-width:480px;margin:0 auto;padding:0;}
.ph-screen{min-height:100vh;display:flex;flex-direction:column;padding:20px 16px;gap:16px;}
.ph-bank-hero{text-align:center;padding:20px;background:var(--c-surface);border:1px solid var(--c-border);border-radius:12px;}
.ph-player-name{font-size:24px;font-weight:700;color:var(--c-ink);margin-bottom:4px;}
.ph-team{font-size:12px;text-transform:uppercase;letter-spacing:0.1em;color:var(--c-muted);}
.ph-amount{font-size:42px;font-weight:700;color:var(--c-gold-light);font-family:var(--font-display);letter-spacing:0.02em;margin:8px 0;}
.ph-status{font-size:14px;color:var(--c-muted);text-align:center;line-height:1.6;padding:8px 0;}
.ph-vote-btns{display:flex;flex-direction:column;gap:10px;}
.ph-vote-btn{background:var(--c-surface2);border:1px solid var(--c-border2);color:var(--c-ink);border-radius:10px;padding:16px;font-size:15px;font-weight:600;text-align:left;cursor:pointer;transition:all .15s;}
.ph-vote-btn:hover{border-color:var(--c-accent);}
.ph-vote-btn.picked{background:var(--c-accent);color:#fff8ec;border-color:var(--c-accent-hi);}
.ph-vote-letter{color:var(--c-accent);font-weight:700;margin-right:8px;}
.ph-vote-btn.picked .ph-vote-letter{color:#fff8ec;}
.ph-wager-input{width:100%;font-size:32px;font-weight:700;text-align:center;background:var(--c-surface);border:2px solid var(--c-gold-dim);border-radius:10px;color:var(--c-gold-light);padding:14px;letter-spacing:0.05em;}
.ph-wager-input:focus{border-color:var(--c-gold);}

/* ===== Lobby / ending screens ===== */
.center-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;text-align:center;gap:20px;}
.lobby-title{font-family:var(--font-display);letter-spacing:0.08em;font-size:clamp(32px,6vw,64px);font-family:var(--font-display);color:var(--c-gold);letter-spacing:0.05em;line-height:1;}
.lobby-sub{font-size:16px;color:var(--c-muted);max-width:400px;line-height:1.6;}
.code-display{font-size:clamp(36px,8vw,72px);font-family:var(--font-display);letter-spacing:0.2em;color:var(--c-ink);background:var(--c-surface);border:2px solid var(--c-gold-dim);border-radius:14px;padding:16px 32px;}
.lobby-list{display:flex;flex-direction:column;gap:8px;width:100%;max-width:360px;}
.lobby-item{display:flex;align-items:center;justify-content:space-between;background:var(--c-surface);border:1px solid var(--c-border);border-radius:8px;padding:12px 16px;cursor:pointer;transition:all .15s;}
.lobby-item:hover{border-color:var(--c-gold);}
.lobby-item-code{font-size:18px;font-weight:700;letter-spacing:0.15em;color:var(--c-gold);}
.lobby-item-info{font-size:12px;color:var(--c-muted);}
.end-trophy{font-size:clamp(48px,10vw,96px);margin-bottom:10px;}
.end-title{font-size:clamp(28px,5vw,52px);font-family:var(--font-display);color:var(--c-gold);letter-spacing:0.05em;}
.end-winner{font-size:clamp(32px,6vw,64px);font-weight:700;color:var(--c-ink);}

/* ===== Supabase config ===== */
const SUPABASE_URL = 'https://lmjluzxzxpbuhvantbwt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxtamx1enh6eHBidWh2YW50Ynd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNzQyMzcsImV4cCI6MjA5OTY1MDIzN30.Qj0SZi_pBJNvLdDj5Hr9osh9ub3xRkhRyx-1AZjElKY';

async function sbFetch(path, opts){
  const res = await fetch(SUPABASE_URL + path, {
    ...opts,
    headers:{
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(opts && opts.headers)
    }
  });
  if(!res.ok) return null;
  const text = await res.text();
  try{ return JSON.parse(text); } catch(e){ return null; }
}

async function dbGet(key){
  if(!hasSupabase){
    try{ const v=localStorage.getItem(key); return v!==null?{key,value:v}:null; } catch(e){ return null; }
  }
  const rows = await sbFetch('/rest/v1/kv_store?key=eq.'+encodeURIComponent(key)+'&select=key,value&limit=1',{method:'GET'});
  return (rows&&rows.length)?{key,value:rows[0].value}:null;
}
async function dbSet(key, value){
  if(!hasSupabase){
    try{ localStorage.setItem(key,value); return {key,value}; } catch(e){ return null; }
  }
  const row = await sbFetch('/rest/v1/kv_store',{
    method:'POST',
    headers:{'Prefer':'resolution=merge-duplicates,return=representation'},
    body:JSON.stringify({key,value})
  });
  return row?{key,value}:null;
}
async function dbDelete(key){
  if(!hasSupabase){
    try{ localStorage.removeItem(key); return {key,deleted:true}; } catch(e){ return null; }
  }
  await sbFetch('/rest/v1/kv_store?key=eq.'+encodeURIComponent(key),{method:'DELETE'});
  return {key,deleted:true};
}
async function dbList(prefix){
  if(!hasSupabase){
    try{
      const keys=[];
      for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(prefix))keys.push(k);}
      return keys;
    } catch(e){ return []; }
  }
  const rows = await sbFetch('/rest/v1/kv_store?key=like.'+encodeURIComponent(prefix+'%')+'&select=key',{method:'GET'});
  return rows?rows.map(r=>r.key):[];
}

/* ===== Constants ===== */
const QWERTY = ['QWERTYUIOP','ASDFGHJKL','ZXCVBNM'];
const LEVEL_MONEY = [100,200,300,400,500,600,700,800,900,1000,1100,1200,1300,1400,1500];
const DIFFICULTIES = ['easy','medium','hard'];
const LEVEL_DIFFICULTY_DEFAULT = (l) => l<=5?'easy':l<=10?'medium':'hard';
const LIFELINE_DEFS = [
  {key:'promote', label:'Promote', icon:'👤', desc:'Swap a teammate into the hot seat permanently'},
  {key:'doubleDip', label:'Double Dip', icon:'🔁', desc:'Two attempts; first miss triggers no steal'},
  {key:'swap', label:'Swap It Out', icon:'🔀', desc:'Discard this question, draw a new one'},
  {key:'bomb', label:'Hail Mary', icon:'🙏', desc:'Skip the question — spin the chance wheel for cash, bankruptcy, or a seat swap'},
];
const PUZZLE_TIMER_MS = 20000;
// Lobby uses named slugs

/* ===== State schema ===== */
function defaultState(){
  return {
    // Meta
    code: '',
    lobbyName: '',
    gamePhase: 'setup', // setup | live | puzzle | wager | ended
    // Teams
    teamAName: 'Team A',
    teamBName: 'Team B',
    teamABank: 0,
    teamBBank: 0,
    // Players [{id,name,team,personalBank}]
    players: [],
    hotSeatTeam: 'A',
    hotSeatPlayerId: null,
    hotSeatQueue: {A:[], B:[]}, // ordered player ids for rotation
    // Questions (pool, lives in lobby state)
    questions: [],
    // Ladder
    ladderCurrent: 1,
    ladderWon: Array(15).fill(false), // which levels have been cleared
    levelTypes: Array(15).fill(''), // '' = auto by difficulty, 'puzzle' = puzzle
    // Lifelines
    lifelines: {
      A:{promote:false,doubleDip:false,swap:false},
      B:{promote:false,doubleDip:false,swap:false}
    },
    // Current flow
    currentQuestion: null,
    flow: {stage:'idle',optionsRevealed:0,hotSeatAnswer:-1,stealPeeked:false,stealRevealed:false,doubleDipUsed:false},
    // Steal
    steal: null,
    stealRoundCounter: 0,
    wheel: null,
    // Puzzle
    puzzle: {
      phrase:'', category:'', revealedLetters:[], usedLetters:[],
      active:false, glitchAt:0,
      currentGuessingTeam:'A',
      timerStartedAt:0, timerPaused:true, timerElapsed:0
    },
    // Wager (before level 15)
    wager: {active:false, question:null, wagers:{}, revealed:false, resolved:false},
    // Score adjustments
    adjustments: [],
    // Phrase bank (puzzle content)
    phraseBank: [],
    // Ending
    ended: false,
  };
}

function normalizeState(s){
  const d = defaultState();
  for(const k of Object.keys(d)){
    if(!(k in s)) s[k]=d[k];
  }
  if(!s.puzzle) s.puzzle = d.puzzle;
  if(!s.wager) s.wager = d.wager;
  if(!s.lifelines.A.hasOwnProperty('promote')){
    ['A','B'].forEach(t=>{
      s.lifelines[t].promote = s.lifelines[t].huddle||false;
      delete s.lifelines[t].huddle;
      delete s.lifelines[t].bomb;
    });
  }
  return s;
}

/* ===== App state ===== */
let state = defaultState();
let currentLobbyCode = '';
let mode = 'entry'; // entry | host | display | player
let hostTab = 'game'; // game | setup | questions | rules
let lastSavedJSON = '';
let pollTimer = null;
let uiCollapsed = {};
let editingQuestion = null;
let editingPhrase = null;
let pendingModal = null;
let myPlayerId = null;
let phoneVotedRound = null;
let phoneWagerSubmitted = false;
let displayPrevRevealed = new Set();
let lastGlitchSeen = 0;
let lastWheelSeen = 0;
let puzzleTimerRAF = null;

// Detect hash-based routing
function detectMode(){
  const h = location.hash;
  if(h==='#host') return 'host';
  if(h==='#display') return 'display';
  if(h==='#player'||h===''||h==='#') return 'player';
  return 'player';
}

/* ===== Utilities ===== */
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function slugify(name){
  return name.toLowerCase().trim()
    .replace(/[^a-z0-9\s-]/g,'')
    .replace(/\s+/g,'-')
    .replace(/-+/g,'-')
    .slice(0,40)||'game';
}
function esc(str){ return (str==null?'':String(str)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function money(n){ return '$'+(n||0).toLocaleString(); }
function debounce(fn,delay){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),delay); }; }
function shuffleArray(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; }
function letterFor(i){ return String.fromCharCode(65+i); }

function playerById(id){ return state.players.find(p=>p.id===id)||null; }
function teamName(t){ return t==='A'?state.teamAName:state.teamBName; }
function opposingTeam(t){ return (t||state.hotSeatTeam)==='A'?'B':'A'; }
function hotSeatPlayer(){ return playerById(state.hotSeatPlayerId); }
function levelMoney(l){ return LEVEL_MONEY[(l||state.ladderCurrent)-1]||100; }
function levelType(l){ const idx=(l||state.ladderCurrent)-1; return state.levelTypes[idx]==='puzzle'?'puzzle':'trivia'; }
function levelDiff(l){ const idx=(l||state.ladderCurrent)-1; if(state.levelTypes[idx]==='puzzle') return 'puzzle'; return LEVEL_DIFFICULTY_DEFAULT(l||state.ladderCurrent); }
function correctDisplayIdx(q){ return q&&q.displayOrder?q.displayOrder.indexOf(0):-1; }

function availableQuestions(difficulty){
  const pool = state.questions.filter(q=>q.difficulty===difficulty&&!q.used);
  if(pool.length) return pool;
  return state.questions.filter(q=>q.difficulty===difficulty); // fallback used ones
}
function pickQuestion(difficulty){
  let pool = state.questions.filter(q=>q.difficulty===difficulty&&!q.used);
  if(!pool.length) pool = state.questions.filter(q=>q.difficulty===difficulty);
  if(!pool.length) pool = state.questions.filter(q=>!q.used);
  if(!pool.length) pool = state.questions;
  if(!pool.length) return null;
  return pool[Math.floor(Math.random()*pool.length)];
}
function makeCurrentQuestion(q, level){
  const opts = (q.options||[]).slice();
  return {
    id:q.id, level:level||state.ladderCurrent,
    difficulty:q.difficulty, text:q.text,
    options:opts,
    displayOrder: opts.length>1 ? shuffleArray(opts.map((_,i)=>i)) : [0],
    imageKey: q.imageKey||null,
  };
}

/* ===== Lobby / persistence ===== */
function lobbyKey(code){ return 'lobby:'+(code||currentLobbyCode); }

async function loadLobby(code){
  const res = await dbGet(lobbyKey(code));
  if(res&&res.value){
    state = normalizeState(JSON.parse(res.value));
    currentLobbyCode = code;
    lastSavedJSON = res.value;
    return true;
  }
  return false;
}

async function saveLobby(){
  const json = JSON.stringify(state);
  lastSavedJSON = json;
  await dbSet(lobbyKey(), json);
}

async function createLobby(name){
  const slug=slugify(name||'game');
  state=defaultState(); state.code=slug; state.lobbyName=name||slug;
  currentLobbyCode=slug; await saveLobby(); return slug;
}

async function listLobbies(){
  const keys=await dbList('lobby:'); const lobbies=[];
  for(const k of keys.slice(0,20)){
    const res=await dbGet(k);
    if(res&&res.value){ try{ const s=JSON.parse(res.value);
      lobbies.push({code:s.code||k.replace('lobby:',''),name:s.lobbyName||s.code||k.replace('lobby:',''),phase:s.gamePhase,playerCount:(s.players||[]).length});
    } catch(e){} }
  }
  return lobbies;
}

async function pollForUpdates(){
  if(!currentLobbyCode) return;
  try{
    const res = await dbGet(lobbyKey());
    if(res&&res.value&&res.value!==lastSavedJSON){
      const newState = normalizeState(JSON.parse(res.value));
      state = newState;
      lastSavedJSON = res.value;
      render();
    }
  } catch(e){}
  // Poll steal votes if host
  if(mode==='host'&&state.steal&&!state.steal.locked){
    await pollStealVotes();
  }
  // Poll wagers if host
  if(mode==='host'&&state.wager&&state.wager.active&&!state.wager.revealed){
    await pollWagers();
  }
}

/* ===== Modal ===== */
function showModal(icon, message, confirmLabel, onConfirm){
  pendingModal = onConfirm;
  document.getElementById('modal-icon').textContent = icon;
  document.getElementById('modal-message').innerHTML = message;
  document.getElementById('modal-picker').style.display = 'none';
  document.getElementById('modal-input-wrap').style.display = 'none';
  const confirmBtn = document.getElementById('modal-confirm-btn');
  confirmBtn.style.display = onConfirm?'':'none';
  confirmBtn.textContent = confirmLabel||'Confirm';
  document.getElementById('modal-overlay').classList.add('show');
}
function showPicker(message, items, onPick){
  pendingModal = null;
  document.getElementById('modal-icon').textContent = '👆';
  document.getElementById('modal-message').innerHTML = message;
  const picker = document.getElementById('modal-picker');
  picker.innerHTML = items.map((it,i)=>`<button class="picker-item" data-i="${i}">${esc(it.label)}</button>`).join('');
  picker.style.display = 'flex';
  picker.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click',()=>{ cancelModal(); onPick(items[parseInt(btn.dataset.i)].value); });
  });

  document.getElementById('modal-confirm-btn').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('show');
}
function showUrlModal(title, url){
  showModal('🔗', `<b>${esc(title)}</b><br><br><input type="text" readonly value="${esc(url)}" id="url-modal-inp" style="width:100%;padding:9px;border:1px solid var(--c-gold-dim);border-radius:7px;background:var(--c-surface);color:var(--c-ink);font-size:13px;text-align:center;"><div class="hint" style="margin-top:6px;">Tap/click above to select and copy.</div>`, null, null);
  setTimeout(()=>{ const el=document.getElementById('url-modal-inp'); if(el) el.select(); },80);
}
function cancelModal(){
  pendingModal=null;
  document.getElementById('modal-overlay').classList.remove('show');
}
function confirmModal(){
  const fn=pendingModal; cancelModal(); if(fn) fn();
}

/* ============================================================
   Part 3: Game actions — flow, steal, lifelines, puzzle, wager, new game
   ============================================================ */

/* ===== Question flow ===== */
async function hostDrawQuestion(){
  const diff = levelDiff(state.ladderCurrent);
  const lt = levelType(state.ladderCurrent);
  if(lt==='puzzle'){
    state.currentQuestion=null;
    state.flow={stage:'idle',optionsRevealed:0,hotSeatAnswer:-1,stealPeeked:false,stealRevealed:false,doubleDipUsed:false};
  } else {
    const q = pickQuestion(diff);
    if(!q){ state.currentQuestion=null; } else {
      q.used=true;
      state.currentQuestion = makeCurrentQuestion(q, state.ladderCurrent);
      state.flow={stage:'idle',optionsRevealed:0,hotSeatAnswer:-1,stealPeeked:false,stealRevealed:false,doubleDipUsed:false};
    }
  }
  state.steal=null; state.wheel=null;
  await saveLobby(); renderHost();
}

async function rerollQuestion(){
  const q = state.currentQuestion;
  const diff = q ? q.difficulty : levelDiff(state.ladderCurrent);
  const newQ = pickQuestion(diff);
  if(!newQ) return;
  newQ.used=true;
  state.currentQuestion = makeCurrentQuestion(newQ, state.ladderCurrent);
  state.flow={stage:'idle',optionsRevealed:0,hotSeatAnswer:-1,stealPeeked:false,stealRevealed:false,doubleDipUsed:false};
  await saveLobby(); renderHost();
}

async function flowAdvance(){
  const f=state.flow; const q=state.currentQuestion; if(!q) return;
  const optCount=q.options.length; const isMC=optCount>1;
  if(f.stage==='idle'){ f.stage='question'; }
  else if(f.stage==='question'){ if(isMC){f.stage='options';f.optionsRevealed=1;}else{f.stage='selecting';} }
  else if(f.stage==='options'){ if(f.optionsRevealed<optCount) f.optionsRevealed++; if(f.optionsRevealed>=optCount) f.stage='selecting'; }
  await saveLobby(); renderHost();
}
async function hostSelectAnswer(di){
  state.flow.hotSeatAnswer=di;
  const correctIdx=correctDisplayIdx(state.currentQuestion);
  if(di===correctIdx){
    state.flow.stage='revealed';
  } else if(state.lifelines[state.hotSeatTeam].doubleDip&&!state.flow.doubleDipUsed){
    // Double Dip: first miss just costs the guess, no steal yet
    state.flow.doubleDipUsed=true;
    state.flow.stage='doubledip-miss';
  } else {
    // Wrong — create steal record and go to steal-peek
    state.flow.stage='steal-peek';
    state.flow.stealPeeked=true;
    state.stealRoundCounter++;
    const panelTeam=opposingTeam();
    const nextInLine=getNextInLine(panelTeam);
    state.steal={
      roundId:state.stealRoundCounter, panelTeam,
      nextInLineId:nextInLine?nextInLine.id:null,
      votes:{}, locked:false, resolved:false, outcome:null
    };
    state.wheel=null;
  }
  await saveLobby(); renderHost();
}
async function retryDoubleDip(){
  state.flow.stage='selecting';
  state.flow.hotSeatAnswer=-1;
  await saveLobby(); renderHost();
}
async function revealHotSeatResult(){ state.flow.stage='revealed'; await saveLobby(); renderHost(); } // kept for safety
async function revealStealGuess(){ state.flow.stage='steal-peek'; state.flow.stealPeeked=true; await saveLobby(); renderHost(); }
async function revealCorrectAnswer(){ state.flow.stage='steal-reveal'; state.flow.stealRevealed=true; await saveLobby(); renderHost(); }

function flowButtonLabel(){
  const f=state.flow; const q=state.currentQuestion; if(!q) return '';
  if(f.stage==='idle') return 'Reveal Question';
  if(f.stage==='question') return q.options.length>1?'Reveal Option A':'Show Answer';
  if(f.stage==='options') return f.optionsRevealed<q.options.length?'Reveal Option '+letterFor(f.optionsRevealed):'';
  return '';
}

async function markCorrect(){
  const lvl=state.ladderCurrent; const amt=levelMoney(lvl); const hp=hotSeatPlayer();
  if(hp) hp.personalBank=(hp.personalBank||0)+amt;
  if(state.hotSeatTeam==='A') state.teamABank=(state.teamABank||0)+amt;
  else state.teamBBank=(state.teamBBank||0)+amt;
  state.ladderWon[lvl-1]=true;
  if(lvl<15) state.ladderCurrent=lvl+1;
  if(state.ladderCurrent===15&&!state.wager.resolved){ await startWager(); return; }
  state.currentQuestion=null; state.flow={stage:'idle',optionsRevealed:0,hotSeatAnswer:-1,stealPeeked:false,stealRevealed:false,doubleDipUsed:false};
  state.steal=null; state.wheel=null; state.puzzle.active=false;
  await saveLobby(); renderHost();
}
async function advanceLevelNoMoney(){
  const lvl=state.ladderCurrent;
  // Failed steal — rotate the panel team so next player gets a turn next time
  if(state.steal) rotateQueue(state.steal.panelTeam);
  if(lvl<15) state.ladderCurrent=lvl+1;
  if(state.ladderCurrent===15&&!state.wager.resolved){ await startWager(); return; }
  state.currentQuestion=null; state.flow={stage:'idle',optionsRevealed:0,hotSeatAnswer:-1,stealPeeked:false,stealRevealed:false,doubleDipUsed:false};
  state.steal=null; state.wheel=null;
  await saveLobby(); renderHost();
}

async function startSteal(){
  state.stealRoundCounter++;
  const panelTeam=opposingTeam(); const nextInLine=getNextInLine(panelTeam);
  state.steal={roundId:state.stealRoundCounter,panelTeam,nextInLineId:nextInLine?nextInLine.id:null,votes:{},locked:false,resolved:false,outcome:null};
  state.wheel=null; await saveLobby(); renderHost();
}
function getNextInLine(team){
  const q=state.hotSeatQueue[team]||[];
  // Skip whoever is currently in the hot seat
  for(let i=0;i<q.length;i++){
    if(q[i]!==state.hotSeatPlayerId) return playerById(q[i])||null;
  }
  // All in queue are hot seat (shouldn't happen), fall back to first non-hotseat player
  return state.players.find(p=>p.team===team&&p.id!==state.hotSeatPlayerId)||null;
}
function rotateQueue(team){ const q=state.hotSeatQueue[team]||[]; if(q.length>1) q.push(q.shift()); }

async function pollStealVotes(){
  if(!state.steal||state.steal.locked) return;
  const prefix=`gsv:${currentLobbyCode}:${state.steal.roundId}:`;
  const keys=await dbList(prefix);
  let changed=false;
  for(const k of keys){
    const pid=k.slice(prefix.length);
    if(!(pid in state.steal.votes)){
      const res=await dbGet(k);
      if(res&&res.value!==undefined){ state.steal.votes[pid]=parseInt(res.value,10); changed=true; }
    }
  }
  if(changed){ await saveLobby(); if(mode==='host') renderHost(); }
}

async function hostSetVote(playerId, displayIdx){
  if(!state.steal) return;
  state.steal.votes[playerId]=displayIdx;
  await saveLobby(); renderHost();
}
async function hostSetStealVote(displayIdx){
  if(!state.steal) return;
  const nil=getNextInLine(state.steal.panelTeam);
  if(nil){ state.steal.votes[nil.id]=displayIdx; }
  await saveLobby(); renderHost();
}

async function resolveSteal(){
  if(!state.steal||!state.currentQuestion) return;
  state.steal.locked=true;
  const correctIdx=correctDisplayIdx(state.currentQuestion);
  const panelTeam=state.steal.panelTeam||opposingTeam();
  const amt=levelMoney(state.ladderCurrent);
  const nil=getNextInLine(panelTeam);
  const theirVote=nil?state.steal.votes[nil.id]:undefined;
  if(theirVote===correctIdx&&nil){
    nil.personalBank=(nil.personalBank||0)+amt;
    state.steal.outcome='stolen'; await applyStealWinner(nil.id);
  } else {
    state.steal.outcome='defended'; state.steal.resolved=true;
    await saveLobby(); renderHost();
  }
}

async function applyStealWinner(playerId){
  const p=playerById(playerId); if(!p) return;
  const lvl=state.ladderCurrent; const amt=levelMoney(lvl);
  if(p.team==='A') state.teamABank=(state.teamABank||0)+amt;
  else state.teamBBank=(state.teamBBank||0)+amt;
  const origTeam=state.hotSeatTeam;
  // Rotate stealing team: winner (front) moves to back
  rotateQueue(p.team);
  // Rotate original team: advance to next player
  rotateQueue(origTeam);
  state.hotSeatPlayerId=p.id; state.hotSeatTeam=p.team;
  state.ladderWon[lvl-1]=true;
  if(lvl<15) state.ladderCurrent=lvl+1;
  if(state.ladderCurrent===15&&!state.wager.resolved){
    await startWager(); return;
  }
  state.currentQuestion=null; state.flow={stage:'idle',optionsRevealed:0,hotSeatAnswer:-1,stealPeeked:false,stealRevealed:false,doubleDipUsed:false};
  state.steal=null; state.wheel=null; state.puzzle.active=false;
  await saveLobby(); renderHost();
}

async function confirmWheelWinner(){
  if(!state.wheel) return;
  await applyStealWinner(state.wheel.playerIds[state.wheel.winnerIdx]);
}

async function confirmBombWheel(){
  if(!state.wheel||state.wheel.kind!=='bomb') return;
  const outcome=state.wheel.outcomes[state.wheel.winnerIdx];
  const lvl=state.ladderCurrent; const hp=hotSeatPlayer();
  if(outcome.type==='win'){
    if(hp) hp.personalBank=(hp.personalBank||0)+outcome.amount;
    if(state.hotSeatTeam==='A') state.teamABank=(state.teamABank||0)+outcome.amount;
    else state.teamBBank=(state.teamBBank||0)+outcome.amount;
    state.ladderWon[lvl-1]=true;
    if(lvl<15) state.ladderCurrent=lvl+1;
    if(state.ladderCurrent===15&&!state.wager.resolved){ state.wheel=null; await startWager(); return; }
  } else if(outcome.type==='bankrupt'){
    if(hp) hp.personalBank=0;
  } else if(outcome.type==='swap'){
    const other=opposingTeam();
    const nil=getNextInLine(other);
    if(nil){ state.hotSeatPlayerId=nil.id; state.hotSeatTeam=other; }
  }
  state.wheel=null; state.currentQuestion=null;
  state.flow={stage:'idle',optionsRevealed:0,hotSeatAnswer:-1,stealPeeked:false,stealRevealed:false,doubleDipUsed:false};
  await saveLobby(); renderHost();
}

/* ===== Lifelines ===== */
async function useLifeline(key){
  const team=state.hotSeatTeam;
  if(state.lifelines[team][key]) return;
  if(key==='promote'){
    const teammates=state.players.filter(p=>p.team===team&&p.id!==state.hotSeatPlayerId);
    if(!teammates.length){ showModal('👤','No other teammates to promote.',null,null); return; }
    showPicker('Promote: who takes the hot seat?', teammates.map(p=>({label:p.name,value:p.id})), async pid=>{
      state.lifelines[team].promote=true;
      state.hotSeatPlayerId=pid;
      await saveLobby(); renderHost();
    });
    return;
  }
  if(key==='swap'){
    state.lifelines[team].swap=true;
    const diff=state.currentQuestion?state.currentQuestion.difficulty:levelDiff(state.ladderCurrent);
    const newQ=pickQuestion(diff);
    if(newQ){ newQ.used=true; state.currentQuestion=makeCurrentQuestion(newQ,state.ladderCurrent); state.flow={stage:'idle',optionsRevealed:0,hotSeatAnswer:-1,stealPeeked:false,stealRevealed:false,doubleDipUsed:false}; }
    await saveLobby(); renderHost(); return;
  }
  if(key==='bomb'){
    state.lifelines[team].bomb=true;
    const lvl=state.ladderCurrent; const base=levelMoney(lvl);
    const amounts=[Math.round(base*0.5),base,Math.round(base*1.5),base*2];
    const names=[money(amounts[0]),money(amounts[1]),money(amounts[2]),money(amounts[3]),'BANKRUPT','SWAP SEAT'];
    const outcomes=[{type:'win',amount:amounts[0]},{type:'win',amount:amounts[1]},{type:'win',amount:amounts[2]},{type:'win',amount:amounts[3]},{type:'bankrupt'},{type:'swap'}];
    const order=shuffleArray(outcomes.map((_,i)=>i));
    state.wheel={
      kind:'bomb',
      names:order.map(i=>names[i]),
      outcomes:order.map(i=>outcomes[i]),
      winnerIdx:Math.floor(Math.random()*order.length),
      spunAt:Date.now()
    };
    state.currentQuestion=null;
    state.flow={stage:'idle',optionsRevealed:0,hotSeatAnswer:-1,stealPeeked:false,stealRevealed:false,doubleDipUsed:false};
    state.steal=null;
    await saveLobby(); renderHost(); return;
  }
  state.lifelines[team][key]=true;
  await saveLobby(); renderHost();
}

/* ===== Score adjustments ===== */
async function applyAdjustment(targetType, targetId, amount, reason){
  // targetType: 'player' | 'teamA' | 'teamB'
  const adj={id:genId(),targetType,targetId,amount,reason:reason||'Manual adjustment',ts:Date.now()};
  state.adjustments.push(adj);
  if(targetType==='player'){
    const p=playerById(targetId);
    if(p) p.personalBank=Math.max(0,(p.personalBank||0)+amount);
  } else if(targetType==='teamA'){
    state.teamABank=Math.max(0,(state.teamABank||0)+amount);
  } else if(targetType==='teamB'){
    state.teamBBank=Math.max(0,(state.teamBBank||0)+amount);
  }
  await saveLobby(); renderHost();
}

async function triggerPuzzle(){
  const avail=state.phraseBank.filter(p=>!p.used);
  const pool=avail.length?avail:state.phraseBank;
  if(!pool.length){ showModal('🧩','No puzzle phrases in the bank. Add some in Setup.',null,null); return; }
  const entry=pool[Math.floor(Math.random()*pool.length)];
  entry.used=true;
  state.puzzle={
    phrase:entry.phrase, category:entry.category||'',
    revealedLetters:[], usedLetters:[],
    active:true, glitchAt:Date.now(),
    currentGuessingTeam:state.hotSeatTeam,
    timerStartedAt:0, timerPaused:true, timerElapsed:0
  };
  state.currentQuestion=null; state.flow={stage:'idle',optionsRevealed:0,hotSeatAnswer:-1,stealPeeked:false,stealRevealed:false,doubleDipUsed:false};
  await saveLobby(); renderHost();
}

async function pressLetter(ch){
  if(state.puzzle.usedLetters.includes(ch)) return;
  state.puzzle.usedLetters.push(ch);
  if((state.puzzle.phrase||'').toUpperCase().includes(ch)){
    state.puzzle.revealedLetters.push(ch);
  }
  // Start/reset timer
  state.puzzle.timerStartedAt=Date.now();
  state.puzzle.timerPaused=false;
  state.puzzle.timerElapsed=0;
  await saveLobby(); renderHost();
}

async function pausePuzzleTimer(){
  if(state.puzzle.timerPaused) return;
  state.puzzle.timerElapsed=(state.puzzle.timerElapsed||0)+(Date.now()-state.puzzle.timerStartedAt);
  state.puzzle.timerPaused=true;
  await saveLobby(); renderHost();
}

async function resumePuzzleTimer(){
  if(!state.puzzle.timerPaused) return;
  state.puzzle.timerStartedAt=Date.now();
  state.puzzle.timerPaused=false;
  await saveLobby(); renderHost();
}

async function swapPuzzleHotSeat(){
  const other=opposingTeam(state.puzzle.currentGuessingTeam);
  state.puzzle.currentGuessingTeam=other;
  // Move hot seat to next player in queue on other team
  const queue=state.hotSeatQueue[other]||[];
  const candidates=state.players.filter(p=>p.team===other);
  let nextId=null;
  if(queue.length){
    const cur=queue.shift(); queue.push(cur); nextId=queue[0];
  } else if(candidates.length){
    nextId=candidates[0].id;
  }
  if(nextId){ state.hotSeatPlayerId=nextId; state.hotSeatTeam=other; }
  // Reset timer
  state.puzzle.timerStartedAt=Date.now();
  state.puzzle.timerPaused=false;
  state.puzzle.timerElapsed=0;
  await saveLobby(); renderHost();
}

async function puzzleSolved(){
  await pausePuzzleTimer();
  const lvl=state.ladderCurrent; const amt=levelMoney(lvl);
  const hp=hotSeatPlayer();
  if(hp) hp.personalBank=(hp.personalBank||0)+amt;
  if(state.hotSeatTeam==='A') state.teamABank=(state.teamABank||0)+amt;
  else state.teamBBank=(state.teamBBank||0)+amt;
  state.ladderWon[lvl-1]=true;
  if(lvl<15) state.ladderCurrent=lvl+1;
  if(state.ladderCurrent===15&&!state.wager.resolved){
    await startWager(); return;
  }
  state.puzzle.active=false;
  state.currentQuestion=null; state.flow={stage:'idle',optionsRevealed:0,hotSeatAnswer:-1,stealPeeked:false,stealRevealed:false,doubleDipUsed:false};
  state.steal=null; state.wheel=null;
  await saveLobby(); renderHost();
}

/* ===== Wager (before level 15) ===== */
async function startWager(){
  const diff=levelDiff(15);
  const q=pickQuestion(diff);
  if(q) q.used=true;
  state.wager={
    active:true,
    question:q?makeCurrentQuestion(q,15):null,
    wagers:{}, revealed:false, resolved:false
  };
  state.gamePhase='wager';
  await saveLobby(); renderHost();
}

async function pollWagers(){
  if(!state.wager||!state.wager.active||state.wager.revealed) return;
  const prefix=`wager:${currentLobbyCode}:`;
  const keys=await dbList(prefix);
  let changed=false;
  for(const k of keys){
    const pid=k.slice(prefix.length);
    if(!(pid in state.wager.wagers)){
      const res=await dbGet(k);
      if(res&&res.value!==undefined){ state.wager.wagers[pid]=parseInt(res.value,10)||0; changed=true; }
    }
  }
  if(changed){ await saveLobby(); if(mode==='host') renderHost(); }
}

async function revealWagerQuestion(){
  state.wager.revealed=true;
  await saveLobby(); renderHost();
}

async function resolveWager(correct){
  const wq=state.wager.question;
  state.players.forEach(p=>{
    const w=state.wager.wagers[p.id]||0;
    if(w===0) return;
    if(correct) p.personalBank=(p.personalBank||0)+w;
    else p.personalBank=Math.max(0,(p.personalBank||0)-w);
  });
  if(!correct){
    // bounce hot seat to other team
    const other=opposingTeam();
    const candidates=state.players.filter(p=>p.team===other);
    if(candidates.length){
      state.hotSeatPlayerId=candidates[0].id;
      state.hotSeatTeam=other;
    }
  }
  state.wager.resolved=true;
  state.gamePhase='live';
  state.currentQuestion=null; state.flow={stage:'idle',optionsRevealed:0,hotSeatAnswer:-1,stealPeeked:false,stealRevealed:false,doubleDipUsed:false};
  await saveLobby(); renderHost();
}

/* ===== Import/Export ===== */
function exportQuestionsMarkdown(){
  let md='# 🔥 The Hot Seat — Questions\n\n';
  ['easy','medium','hard'].forEach(diff=>{
    const qs=state.questions.filter(q=>q.difficulty===diff);
    if(!qs.length) return;
    md+=`## ${diff.charAt(0).toUpperCase()+diff.slice(1)}\n\n`;
    qs.forEach(q=>{
      md+=`### ${q.text}\n`;
      (q.options||[]).forEach((o,i)=>{ md+=`- ${i===0?'[ANSWER] ':''}${o}\n`; });
      md+='\n';
    });
  });
  md+='# Puzzle Phrases\n\n';
  state.phraseBank.forEach(p=>{ md+=`## ${p.category?p.category+': ':''}${p.phrase}\n\n`; });
  const blob=new Blob([md],{type:'text/markdown'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='fortune-questions.md'; a.click();
  URL.revokeObjectURL(url);
}

function importQuestionsMarkdown(file){
  const reader=new FileReader();
  reader.onload=async e=>{
    const text=e.target.result;
    const lines=text.split('\n');
    let currentDiff='easy'; let currentQ=null; let inPhrases=false;
    let imported=0; let importedPhrases=0;
    for(let i=0;i<lines.length;i++){
      const line=lines[i].trim();
      if(line.startsWith('# Puzzle Phrases')){
        if(currentQ){ state.questions.push(currentQ); imported++; currentQ=null; }
        inPhrases=true; continue;
      }
      if(!inPhrases){
        if(line.startsWith('## Easy')) currentDiff='easy';
        else if(line.startsWith('## Medium')) currentDiff='medium';
        else if(line.startsWith('## Hard')) currentDiff='hard';
        else if(line.startsWith('### ')){
          if(currentQ){ state.questions.push(currentQ); imported++; }
          currentQ={id:genId(),text:line.slice(4).trim(),options:[],difficulty:currentDiff,used:false};
        } else if(line.startsWith('- ')&&currentQ){
          const isAnswer=line.startsWith('- [ANSWER] ');
          const optText=isAnswer?line.slice(11).trim():line.slice(2).trim();
          if(isAnswer) currentQ.options.unshift(optText);
          else currentQ.options.push(optText);
        }
      } else if(line.startsWith('## ')){
        // "## Category: PHRASE" or plain "## PHRASE"
        const rest=line.slice(3);
        const colonIdx=rest.indexOf(': ');
        const cat=colonIdx>-1?rest.slice(0,colonIdx).trim():'';
        const phrase=colonIdx>-1?rest.slice(colonIdx+2).trim():rest.trim();
        if(phrase){ state.phraseBank.push({id:genId(),category:cat,phrase,used:false}); importedPhrases++; }
      }
    }
    if(currentQ&&!inPhrases){ state.questions.push(currentQ); imported++; }
    await saveLobby();
    showModal('📥',`Imported ${imported} question${imported===1?'':'s'} and ${importedPhrases} phrase${importedPhrases===1?'':'s'}.`,null,null);
    renderHost();
  };
  reader.readAsText(file);
}

function togglePanel(id){ uiCollapsed[id]=!uiCollapsed[id]; renderHost(); }

function panelWrap(id, icon, title, bodyHtml, extra){
  const collapsed=!!uiCollapsed[id];
  return `<div class="panel">
    <div class="panel-header" onclick="togglePanel('${id}')">
      <div class="panel-title">${icon} ${esc(title)}</div>
      <div style="display:flex;align-items:center;gap:8px;">${extra||''}<span style="color:var(--c-muted);font-size:12px;">${collapsed?'▼':'▲'}</span></div>
    </div>
    <div class="panel-body" style="${collapsed?'display:none;':''}">${bodyHtml}</div>
  </div>`;
}

function buildBoardHTML(puzzle, prevSet){
  const phrase=puzzle.phrase||'';
  if(!phrase.trim()) return '<div class="text-muted text-center" style="padding:20px;">No phrase loaded.</div>';
  const revSet=new Set((puzzle.revealedLetters||[]).map(l=>l.toUpperCase()));
  const words=phrase.toUpperCase().split(' ').filter(w=>w.length>0);
  let html='<div class="board-words">';
  words.forEach(word=>{
    html+='<div class="board-word">';
    for(const ch of word){
      if(!/[A-Z]/.test(ch)){
        html+=`<div class="tile" style="background:transparent;border-color:transparent;">${esc(ch)}</div>`;
      } else if(revSet.has(ch)){
        const isNew=prevSet&&!prevSet.has(ch);
        html+=`<div class="tile${isNew?' flip':''}">${ch}</div>`;
      } else {
        html+=`<div class="tile blank"></div>`;
      }
    }
    html+='</div>';
  });
  html+='</div>';
  return html;
}

function buildKeyboardHTML(puzzle){
  let html='<div class="keyboard">';
  QWERTY.forEach(row=>{
    html+='<div class="kb-row">';
    for(const ch of row){
      const used=(puzzle.usedLetters||[]).includes(ch);
      const hit=(puzzle.revealedLetters||[]).includes(ch);
      let cls='key';
      if(used) cls+=hit?' hit':' miss';
      html+=`<button class="${cls}" ${used?'disabled':''} onclick="pressLetter('${ch}')">${ch}</button>`;
    }
    html+='</div>';
  });
  html+='</div>';
  return html;
}

function puzzleTimerHTML(puzzle, idSuffix){
  const elapsed=puzzle.timerPaused
    ? (puzzle.timerElapsed||0)
    : (puzzle.timerElapsed||0)+(Date.now()-(puzzle.timerStartedAt||Date.now()));
  const remaining=Math.max(0, PUZZLE_TIMER_MS-elapsed);
  const secs=Math.ceil(remaining/1000);
  const pct=remaining/PUZZLE_TIMER_MS;
  const circ=175.9;
  const offset=circ*(1-pct);
  const urgent=secs<=5;
  return `<div class="puzzle-timer">
    <div class="timer-circle">
      <svg class="timer-svg" viewBox="0 0 60 60">
        <circle class="timer-track" cx="30" cy="30" r="28"/>
        <circle class="timer-fill${urgent?' urgent':''}" cx="30" cy="30" r="28" id="timer-fill-${idSuffix}"
          style="stroke-dashoffset:${offset.toFixed(1)}"/>
      </svg>
      <div class="timer-num" id="timer-num-${idSuffix}">${secs}</div>
    </div>
    <div class="timer-label">${puzzle.timerPaused?'Paused':'Guessing — '+esc(teamName(puzzle.currentGuessingTeam))}</div>
  </div>`;
}

function buildWheelHTML(wheel, idSuffix){
  const n=wheel.names.length;
  const seg=360/n;
  const cols=['#d4a843','#1a5fa8','#b8882a','#2e5fa8','#e8c66b','#254880','#f0da9c','#122844'];
  const stops=wheel.names.map((_,i)=>`${cols[i%cols.length]} ${i*seg}deg ${(i+1)*seg}deg`).join(', ');
  const labels=wheel.names.map((name,i)=>{
    const angle=i*seg+seg/2;
    return `<div style="position:absolute;top:50%;left:50%;width:74px;margin-left:-37px;text-align:center;transform:rotate(${angle}deg) translateY(-84px);transform-origin:top center;font-size:11px;font-weight:800;line-height:1.15;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.9);word-break:break-word;">${esc(name)}</div>`;
  }).join('');
  return `<div class="wheel-wrap">
    <div class="wheel-outer">
      <div class="wheel-pointer"></div>
      <div class="wheel-disc" id="wheel-disc-${idSuffix}" style="background:conic-gradient(${stops});">
        <div style="position:relative;width:100%;height:100%;">${labels}</div>
      </div>
    </div>
    <div class="wheel-result" id="wheel-result-${idSuffix}"></div>
  </div>`;
}

function wheelResultText(wheel){
  return wheel.kind==='bomb' ? wheel.names[wheel.winnerIdx] : wheel.names[wheel.winnerIdx]+' takes the hot seat!';
}

function animateWheel(wheel, idSuffix){
  const disc=document.getElementById('wheel-disc-'+idSuffix);
  const result=document.getElementById('wheel-result-'+idSuffix);
  if(!disc) return;
  const n=wheel.names.length; const seg=360/n;
  const winCenter=wheel.winnerIdx*seg+seg/2;
  const finalDeg=360*6+(360-winCenter);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ disc.style.transform=`rotate(${finalDeg}deg)`; }));
  setTimeout(()=>{ if(result) result.textContent=wheelResultText(wheel); },4300);
}

function ladderStripHTML(){
  let html='<div class="ladder-row">';
  for(let l=1;l<=15;l++){
    const won=state.ladderWon[l-1];
    const cur=state.ladderCurrent===l;
    const amt=money(LEVEL_MONEY[l-1]);
    html+=`<div class="lad-ic ${won?'won':''} ${cur?'current':''}">
      ${won?'✓':l}
      <span class="tip">${l}. ${amt}${state.levelTypes[l-1]==='puzzle'?' · Puzzle':''}</span>
    </div>`;
  }
  html+='</div>';
  return html;
}

function diffPill(d){
  return `<span class="diff-${d}">${d}</span>`;
}

/* ===== Puzzle timer live update ===== */
function startPuzzleTimerRAF(){
  if(puzzleTimerRAF) cancelAnimationFrame(puzzleTimerRAF);
  function tick(){
    if(!state.puzzle.active||state.puzzle.timerPaused) return;
    const elapsed=(state.puzzle.timerElapsed||0)+(Date.now()-(state.puzzle.timerStartedAt||Date.now()));
    const remaining=Math.max(0,PUZZLE_TIMER_MS-elapsed);
    const secs=Math.ceil(remaining/1000);
    const pct=remaining/PUZZLE_TIMER_MS;
    const offset=(175.9*(1-pct)).toFixed(1);
    const urgent=secs<=5;
    // update host
    ['host','tv'].forEach(sfx=>{
      const fill=document.getElementById('timer-fill-'+sfx);
      const num=document.getElementById('timer-num-'+sfx);
      if(fill){ fill.style.strokeDashoffset=offset; fill.className='timer-fill'+(urgent?' urgent':''); }
      if(num) num.textContent=secs;
    });
    if(remaining>0) puzzleTimerRAF=requestAnimationFrame(tick);
    else if(mode==='host'){
      // Time's up — only host writes state, so display/player tabs watching in parallel don't race to double-swap
      swapPuzzleHotSeat();
    }
  }
  puzzleTimerRAF=requestAnimationFrame(tick);
}

function renderHost(){

  const root=document.getElementById('app-root');
  // preserve input values

  const saved={};
  preserve.forEach(id=>{ const el=document.getElementById(id); if(el) saved[id]=el.value; });
  const savedTeamSel=document.getElementById('player-team-input')?.value;
  const savedDiff=document.getElementById('q-diff')?.value;
  const savedAdjTarget=document.getElementById('adjust-target')?.value;

  const syncWarn=hasSupabase?'':
    `<div class="sync-warning">⚠ Supabase not configured — running in single-device mode. Phone voting and multi-device sync require Supabase. Add your credentials to the file.</div>`;

  // Topbar
  const hp=hotSeatPlayer();
  const ll=state.lifelines[state.hotSeatTeam];
  const teamAPlayers=state.players.filter(p=>p.team==='A');
  const teamBPlayers=state.players.filter(p=>p.team==='B');
  const setupLocked=state.gamePhase==='setup';
  const activeHostTab=setupLocked&&hostTab!=='rules'?'setup':hostTab;

  const topbar=`<div class="topbar">
    <span class="topbar-brand" style="display:inline-flex;align-items:center;gap:8px;">
      <span style="width:26px;height:auto;flex-shrink:0;">${chairIconSVG()}</span>HOT SEAT
    </span>
    <span class="topbar-code">${esc(state.lobbyName||currentLobbyCode)}</span>
    <div class="team-strip">
      <span class="team-label">${esc(state.teamAName)}</span>
      <span class="money-sm">${money(state.teamABank)}</span>
      ${teamAPlayers.map(p=>`<button class="player-chip ${state.hotSeatPlayerId===p.id?'is-hot':''}" onclick="setHotSeat('${p.id}')">${esc(p.name)}<span class="chip-bank">${money(p.personalBank)}</span></button>`).join('')}
    </div>
    <div style="width:1px;height:28px;background:var(--c-border);margin:0 4px;"></div>
    <div class="team-strip">
      <span class="team-label">${esc(state.teamBName)}</span>
      <span class="money-sm">${money(state.teamBBank)}</span>
      ${teamBPlayers.map(p=>`<button class="player-chip ${state.hotSeatPlayerId===p.id?'is-hot':''}" onclick="setHotSeat('${p.id}')">${esc(p.name)}<span class="chip-bank">${money(p.personalBank)}</span></button>`).join('')}
    </div>
    <div class="tabs">
      <button class="tab-btn ${activeHostTab==='setup'?'active':''}" onclick="setHostTab('setup')">1 · Setup</button>
      <button class="tab-btn ${activeHostTab==='game'?'active':''}" ${setupLocked?'disabled title="Finish setup and Start Hosting first"':''} onclick="setHostTab('game')">2 · Play</button>
      <button class="tab-btn ${activeHostTab==='rules'?'active':''}" onclick="setHostTab('rules')">Rules</button>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
      <button class="btn btn-ghost btn-sm" onclick="openDisplay()">📺 Display</button>
      <button class="btn btn-ghost btn-sm" onclick="copyPlayerLink()">📱 Players</button>
      <button class="btn btn-danger btn-sm" onclick="newGame()">↺ New Game</button>
    </div>
  </div>`;

  // Ladder strip (below topbar)
  const ladderBar=state.gamePhase==='live'||state.gamePhase==='wager'||state.gamePhase==='puzzle'?
    `<div style="padding:8px 20px;background:rgba(255,248,236,0.75);border-bottom:1px solid var(--c-border);display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;">
      <span style="font-size:11px;color:var(--c-muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:700;margin-right:4px;">Level</span>
      ${ladderStripHTML()}
      <span class="money-sm" style="margin-left:8px;">${money(levelMoney(state.ladderCurrent))} up</span>
    </div>`:'';

  // Adjust tool (always visible in game)
  const adjustTool=buildAdjustTool();

  let body='';
  if(hostTab==='rules'){
    body=renderRulesTab();
  } else if(state.gamePhase==='setup'||hostTab==='setup'){
    body=renderSetupTab();
  } else if(state.gamePhase==='ended'){
    body=renderEndedHost();
  } else if(state.gamePhase==='wager'){
    body=renderWagerTab();
  } else {
    body=renderGameTab();
  }

  root.innerHTML=`${topbar}${ladderBar}
    <div class="main-content">
      ${syncWarn}
      ${(state.gamePhase==='live'||state.gamePhase==='wager')?adjustTool:''}
      ${body}

  // Restore inputs
  preserve.forEach(id=>{ const el=document.getElementById(id); if(el&&saved[id]!==undefined) el.value=saved[id]; });

  if(savedDiff){ const el=document.getElementById('q-diff'); if(el) el.value=savedDiff; }
  if(savedAdjTarget){ const el=document.getElementById('adjust-target'); if(el) el.value=savedAdjTarget; }

  // Wire team name inputs
  const ta=document.getElementById('setup-team-a');

  if(tb) tb.addEventListener('input', debounce(e=>{ state.teamBName=e.target.value; saveLobby(); },400));

  // Wheel animation
  if(state.wheel&&state.wheel.spunAt!==lastWheelSeen){
    lastWheelSeen=state.wheel.spunAt;

  } else if(state.wheel){
    const disc=document.getElementById('wheel-disc-host');

    const res=document.getElementById('wheel-result-host');
    if(res) res.textContent=wheelResultText(state.wheel);
  }

  // Puzzle timer RAF
  if(state.puzzle.active&&!state.puzzle.timerPaused) startPuzzleTimerRAF();
}

function buildAdjustTool(){
  const targets=[
    {label:`${esc(state.teamAName)} (team)`, value:'teamA'},
    {label:`${esc(state.teamBName)} (team)`, value:'teamB'},
    ...state.players.map(p=>({label:`${esc(p.name)} (personal)`, value:'player:'+p.id}))
  ];
  return `<div class="adjust-panel">
    <div style="font-size:12px;text-transform:uppercase;letter-spacing:0.1em;color:var(--c-gold);font-weight:700;margin-bottom:10px;">⚖ Manual Adjustment</div>
    <div class="row">
      <div class="field">
        <label>Target</label>
        <select class="input" id="adjust-target">
          ${targets.map(t=>`<option value="${esc(t.value)}">${t.label}</option>`).join('')}
        </select>
      </div>
      <div class="field" style="flex:0.5;">
        <label>Amount</label>
        <input type="number" class="input" id="adjust-amount" placeholder="e.g. -100">
      </div>
      <div class="field w2">
        <label>Reason (optional)</label>
        <input type="text" class="input" id="adjust-reason" placeholder="e.g. Shouted answer penalty">
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="doAdjustment()">Apply</button>
  </div>`;
}

async function doAdjustment(){
  const target=document.getElementById('adjust-target')?.value;
  const amount=parseInt(document.getElementById('adjust-amount')?.value||'0',10);
  const reason=document.getElementById('adjust-reason')?.value||'';
  if(!target||isNaN(amount)||amount===0) return;
  if(target.startsWith('player:')){
    await applyAdjustment('player',target.slice(7),amount,reason);
  } else {
    await applyAdjustment(target,null,amount,reason);
  }
  document.getElementById('adjust-amount').value='';
  document.getElementById('adjust-reason').value='';
}

function renderGameTab(){
  const lt=levelType(state.ladderCurrent);
  const isPuzzleLevel=lt==='puzzle';
  const hp=hotSeatPlayer();
  let html='';

  // Puzzle active
  if(state.puzzle.active){
    html+=renderPuzzleControls();
  }
  // Steal / wheel
  else if(state.wheel){
    html+=state.wheel.kind==='bomb'?renderBombWheel():renderStealWheel();
  } else if(state.steal&&!state.steal.resolved&&['steal-peek','steal-reveal'].includes(state.flow.stage)){
    html+=renderStealBox();
  } else if(state.steal&&state.steal.outcome==='defended'){
    html+=`<div class="steal-box">
      <div class="steal-title">🛡 Nobody stole it!</div>
      <p style="font-size:14px;margin-bottom:14px;">${esc(hp?hp.name:'Hot seat player')} keeps the seat. Drawing a fresh question at the same level.</p>
      <button class="btn btn-primary" onclick="dismissDefendedSteal()">Continue — New Question</button>
    </div>`;
  }
  // Wager active handled by renderWagerTab
  // Normal question flow - always show flow card unless puzzle active
  if(!state.puzzle.active){
    html+=renderFlowCard(isPuzzleLevel);
  }
  return html;
}

function renderFlowCard(isPuzzleLevel){
  const q=state.currentQuestion; const f=state.flow;
  const ll=state.lifelines[state.hotSeatTeam]; const s=state.steal;

  if(isPuzzleLevel&&!state.puzzle.active&&!q) return `<div class="flow-card">
    <div class="flow-level">🧩 Level ${state.ladderCurrent} — Puzzle Round</div>
    <div class="flow-controls"><button class="btn btn-primary" onclick="triggerPuzzle()">⚡ Trigger the Glitch</button></div>
  </div>`;

  if(!q){
    const avail=state.questions.filter(x=>!x.used).length;
    return `<div class="flow-card">
      <div class="flow-level">Level ${state.ladderCurrent} — ${diffPill(levelDiff(state.ladderCurrent))}</div>
      <p style="font-size:14px;color:var(--c-muted);margin-bottom:16px;">${avail} unused question${avail===1?'':'s'}.</p>
      <div class="flow-controls"><button class="btn btn-primary" onclick="hostDrawQuestion()">🎲 Draw Question</button></div>
    </div>`;
  }

  const isMC=q.options.length>1;
  const correctIdx=correctDisplayIdx(q);
  const stage=f.stage;

  // Determine what's visible/active at each stage
  const qRevealed = stage!=='idle';
  // optsRevealed means ALL options are shown (post-options stage)
  const allOptsShown = ['selecting','revealing','revealed','doubledip-miss','steal-peek','steal-reveal'].includes(stage);

  // QUESTION SLOT
  let questionSlot='';
  if(stage==='idle'){
    questionSlot=`<button class="flow-reveal-btn" onclick="flowAdvance()">▶ Reveal Question</button>`;
  } else {
    questionSlot=`<div class="flow-q" style="margin:0;">${esc(q.text)}</div>`;
  }

  // OPTIONS SLOTS — each slot is either a reveal button, a content div, or a tap-to-pick button
  let optSlots='';
  if(isMC){
    optSlots='<div class="flow-opts" style="margin-top:10px;">'+q.displayOrder.map((origIdx,di)=>{
      const isCorrect=origIdx===0;
      const isHSPick=f.hotSeatAnswer===di;
      // Is this option revealed yet?
      const thisRevealed=(stage==='options'&&di<f.optionsRevealed)||allOptsShown;
      // Is this the NEXT slot to reveal?
      const nextToReveal=(stage==='options'&&di===f.optionsRevealed)||(stage==='question'&&di===0);

      if(!qRevealed){
        return `<div class="flow-opt" style="opacity:0.1;height:44px;"></div>`;
      }
      if(!thisRevealed){
        if(nextToReveal){
          return `<button class="flow-reveal-btn" onclick="flowAdvance()">▶ Reveal ${letterFor(di)}</button>`;
        }
        return `<div class="flow-opt" style="opacity:0.1;height:44px;"></div>`;
      }
      // Option is revealed
      if(stage==='selecting'){
        return `<button class="flow-opt" style="cursor:pointer;text-align:left;width:100%;border-color:var(--c-border2);" onclick="hostSelectAnswer(${di})">
          <span class="flow-opt-letter">${letterFor(di)})</span>${esc(q.options[origIdx])}
        </button>`;
      }
      if(stage==='steal-peek'){
        const stealNil=s?getNextInLine(s.panelTeam):null;
        const stealVote=stealNil?s.votes[stealNil.id]:undefined;
        const isPicked=stealVote===di;
        return `<button class="flow-opt${isPicked?' answer-flash':''}" style="cursor:pointer;text-align:left;width:100%;${isPicked?'border-color:var(--c-gold);':'border-color:var(--c-border2);'}" onclick="hostSetStealVote(${di})">
          <span class="flow-opt-letter">${letterFor(di)})</span>${esc(q.options[origIdx])}
        </button>`;
      }
      // Post-selection display
      let cls='flow-opt';
      if(isHSPick&&(stage==='revealing'||stage==='revealed'||stage==='doubledip-miss'||stage==='steal-peek')) cls+=' answer-flash';
      if(stage==='steal-reveal'&&isHSPick) cls+=isCorrect?' correct':' wrong-pick';
      if(stage==='steal-reveal'&&isCorrect&&!isHSPick) cls+=' correct';
      if((stage==='revealed'||stage==='doubledip-miss'||stage==='steal-peek')&&!isHSPick) cls+=' dim';
      return `<div class="${cls}"><span class="flow-opt-letter">${letterFor(di)})</span>${esc(q.options[origIdx])}${isCorrect&&stage==='steal-reveal'?' ✓':''}</div>`;
    }).join('')+'</div>';
  } else if(qRevealed){
    optSlots=`<div style="margin:10px 0;padding:10px 14px;background:var(--c-surface2);border:1px solid var(--c-border);border-radius:8px;font-size:14px;">
      ${stage==='steal-reveal'?`<b style="color:var(--c-green-light);">${esc(q.options[0])}</b>`:'<span style="color:var(--c-muted);">Hidden answer</span>'}
    </div>`;
  }

  // POST-OPTIONS ACTION SLOT
  let actionSlot='';
  if(allOptsShown&&stage==='selecting'){
    actionSlot=`<div style="font-size:13px;color:var(--c-muted);margin-top:6px;padding:8px;background:var(--c-surface2);border-radius:8px;text-align:center;">👆 Tap the answer the hot seat player said</div>`;
  } else if(stage==='revealing'){
    // skipped — hostSelectAnswer goes straight to revealed
  } else if(stage==='revealed'){
    if(f.hotSeatAnswer===correctIdx){
      actionSlot=`<button class="btn btn-success btn-block" style="margin-top:6px;" onclick="markCorrect()">✓ Correct — Bank &amp; Advance</button>`;
    }
  } else if(stage==='doubledip-miss'){
    actionSlot=`<div style="font-size:13px;color:var(--c-gold);margin-top:6px;padding:8px;background:var(--c-surface2);border-radius:8px;text-align:center;">🔁 Double Dip! One more guess — no steal risk yet.</div>
      <button class="btn btn-primary btn-block" style="margin-top:6px;" onclick="retryDoubleDip()">Try Again</button>`;
  } else if(stage==='steal-peek'){
    const stealNilA=s?getNextInLine(s.panelTeam):null;
    const stealVoteA=stealNilA?s.votes[stealNilA.id]:undefined;
    actionSlot=stealVoteA!==undefined
      ?`<button class="flow-reveal-btn" style="margin-top:6px;" onclick="revealCorrectAnswer()">▶ Reveal Correct Answer</button>`
      :`<div style="font-size:13px;color:var(--c-muted);padding:8px;background:var(--c-surface2);border-radius:8px;text-align:center;margin-top:6px;">👆 Tap their answer above</div>`;
  } else if(stage==='steal-reveal'){
    const nil=s?getNextInLine(s.panelTeam):null;
    const theirVote=nil?s.votes[nil.id]:undefined;
    actionSlot=theirVote===correctIdx
      ?`<button class="btn btn-success btn-block" style="margin-top:6px;" onclick="resolveSteal()">✓ Steal — Hand Over Seat</button>`
      :`<button class="btn btn-error btn-block" style="margin-top:6px;" onclick="advanceLevelNoMoney()">Nobody Got It — Next Level</button>`;
  }

  // Steal info
  let stealInfo='';
  if(s&&(stage==='steal-peek'||stage==='steal-reveal')){
    const nil=s?getNextInLine(s.panelTeam):null; const theirVote=nil?s.votes[nil.id]:undefined;
    const isCorrect=theirVote===correctIdx; const showColor=stage==='steal-reveal';
    stealInfo=`<div style="margin-top:8px;padding:10px 14px;background:var(--c-surface2);border:1px solid ${showColor?(isCorrect?'var(--c-green-light)':'var(--c-red-light)'):'var(--c-border)'};border-radius:8px;">
      <div style="font-size:11px;color:var(--c-muted);margin-bottom:2px;">${esc(nil?nil.name:'Other team')} guessed</div>
      <div style="font-size:15px;font-weight:700;">${theirVote!==undefined?letterFor(theirVote)+' — '+esc(q.options[q.displayOrder[theirVote]]):'No vote'}</div>
      ${showColor?`<div style="font-size:12px;font-weight:700;color:${isCorrect?'var(--c-green-light)':'var(--c-red-light)'};">${isCorrect?'✓ Steal!':'✗ Nobody earns'}</div>`:''}
    </div>`;
  }

  // Vote status
  let voteStatus='';
  if(['question','options','selecting','revealing'].includes(stage)&&s){
    const nil=getNextInLine(s.panelTeam);
    if(nil){
      const voted=s.votes[nil.id]!==undefined;
      voteStatus=`<div style="font-size:12px;color:var(--c-muted);padding:6px 0;border-top:1px dashed var(--c-border);margin-top:8px;">
        📱 ${esc(nil.name)} — ${voted?'<span style="color:var(--c-green-light);">locked in ✓</span>':'waiting…'}
      </div>`;
    }
  }

  const showLL=['question','options','selecting'].includes(stage);

  return `<div class="flow-card">
    <div class="flow-level" style="display:flex;align-items:center;justify-content:space-between;">
      <span>Level ${q.level} — ${diffPill(q.difficulty)}</span>
      ${stage==='idle'||stage==='question'?`<button class="btn btn-ghost btn-sm" onclick="rerollQuestion()">🎲 Reroll</button>`:''}
    </div>
    <div class="flow-slot">${questionSlot}</div>
    ${optSlots}
    ${stealInfo}
    ${actionSlot}
    ${voteStatus}
    ${showLL?`<div class="flow-lifelines" style="margin-top:10px;">${LIFELINE_DEFS.map(({key,label,icon})=>
      `<button class="btn btn-ghost btn-sm" ${ll[key]?'disabled style="opacity:0.35;text-decoration:line-through;"':''} onclick="useLifeline('${key}')">${icon} ${label}</button>`
    ).join('')}</div>`:''}
  </div>`;
}
